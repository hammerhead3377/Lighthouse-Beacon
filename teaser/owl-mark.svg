<svg width="300" height="320" viewBox="0 0 300 320" fill="none" xmlns="http://www.w3.org/2000/svg"
  style="filter: drop-shadow(0 0 18px oklch(0.7 0.15 70 / 0.35))">
  <!-- head circle -->
  <circle cx="150" cy="160" r="104" stroke="oklch(0.80 0.155 74)" stroke-width="3" opacity="0.92" />
  <!-- facial disc -->
  <circle cx="150" cy="168" r="74" stroke="oklch(0.80 0.155 74)" stroke-width="2.4" opacity="0.55" />
  <!-- ear tufts — diamonds -->
  <rect x="78" y="58" width="34" height="34" transform="rotate(45 95 75)" stroke="oklch(0.80 0.155 74)" stroke-width="3" opacity="0.85" />
  <rect x="188" y="58" width="34" height="34" transform="rotate(45 205 75)" stroke="oklch(0.80 0.155 74)" stroke-width="3" opacity="0.85" />
  <!-- left eye — dim, closed/turned away -->
  <circle cx="116" cy="150" r="22" stroke="oklch(0.80 0.155 74)" stroke-width="2.7" opacity="0.45" />
  <line x1="100" y1="150" x2="132" y2="150" stroke="oklch(0.80 0.155 74)" stroke-width="3" opacity="0.5" />
  <!-- right eye — the single glowing amber eye -->
  <circle cx="186" cy="150" r="23" fill="oklch(0.80 0.155 74)" opacity="1"
    style="filter: drop-shadow(0 0 10px oklch(0.90 0.13 84))" />
  <circle cx="186" cy="150" r="23" stroke="oklch(0.80 0.155 74)" stroke-width="3" />
  <circle cx="186" cy="150" r="8" fill="#000" />
  <!-- beak — diamond -->
  <rect x="138" y="184" width="24" height="24" transform="rotate(45 150 196)" stroke="oklch(0.80 0.155 74)" stroke-width="3" opacity="0.8" />
</svg>
